###############################################################################
# AI Gateway Bridge - Kernel Security Hardening Parameters
#
# This file contains sysctl parameters for hardening the Linux kernel.
# Place this file at: /etc/sysctl.d/99-ai-gateway-hardening.conf
#
# Apply with: sysctl -p /etc/sysctl.d/99-ai-gateway-hardening.conf
# Or reboot the system for all changes to take effect.
###############################################################################

# =============================================================================
# TCP SYN Flood Protection
# =============================================================================

# Enable TCP SYN cookies to protect against SYN flood attacks.
# When the SYN queue is full, the kernel will use SYN cookies instead of
# dropping connections, allowing legitimate clients to still connect.
net.ipv4.tcp_syncookies = 1

# Increase the maximum SYN backlog queue size.
# Default is usually 128-256; increase to handle bursts of new connections.
net.ipv4.tcp_max_syn_backlog = 4096

# Number of times SYN-ACKs are retransmitted for passive TCP connections.
# Lower value = faster timeout of half-open connections during SYN floods.
net.ipv4.tcp_synack_retries = 2

# Number of times initial SYNs are retransmitted for active TCP connections.
net.ipv4.tcp_syn_retries = 2

# =============================================================================
# ICMP Settings
# =============================================================================

# Ignore ICMP echo requests (ping) to reduce attack surface.
# Set to 1 to completely ignore pings; set to 0 if you need ping for monitoring.
net.ipv4.icmp_echo_ignore_all = 0

# Ignore broadcast ICMP echo requests (Smurf attack protection).
# Always enable this to prevent being used as a Smurf amplifier.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Enable protection against ICMP error message attacks.
# Limits the rate of ICMP error responses to prevent information leakage.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Rate limit ICMP destination unreachable messages (milliseconds).
net.ipv4.icmp_ratelimit = 1000

# =============================================================================
# IP Forwarding Control
# =============================================================================

# Enable IPv4 forwarding ONLY if this server needs to route traffic
# (required for Xray proxy functionality).
# Server A (proxy client) and Server B (proxy server) both need this.
net.ipv4.ip_forward = 1

# Disable IPv6 forwarding unless explicitly needed.
net.ipv6.conf.all.forwarding = 0

# =============================================================================
# Source Routing Protection
# =============================================================================

# Disable source-routed packets on all interfaces.
# Source routing allows attackers to specify the route packets take,
# bypassing network security controls.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Enable reverse path filtering (strict mode).
# Drops packets with source addresses that are not reachable via the
# interface they arrived on. Prevents IP spoofing.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# =============================================================================
# ICMP Redirect Protection
# =============================================================================

# Do not accept ICMP redirect messages.
# Redirect messages can be used to alter routing tables maliciously.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Do not send ICMP redirect messages.
# Prevents this host from acting as a router and sending redirects.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# IPv6 redirect protection
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# =============================================================================
# TCP/IP Stack Hardening
# =============================================================================

# Enable TCP timestamps for better round-trip time estimation
# and protection against wrapped sequence numbers.
net.ipv4.tcp_timestamps = 1

# Enable TCP window scaling for high-bandwidth connections.
net.ipv4.tcp_window_scaling = 1

# Enable TCP selective acknowledgments for better performance
# on lossy connections.
net.ipv4.tcp_sack = 1

# Decrease the time for FIN-WAIT-2 state (seconds).
# Reduces the number of stale connections consuming resources.
net.ipv4.tcp_fin_timeout = 15

# Reduce keepalive time to detect dead connections faster (seconds).
# NOTE: 100-ai-gateway-keepalive.conf overrides these with more aggressive
# values (30s/10s/3 probes) for proxy tunnel connections. These conservative
# defaults apply only when the keepalive overlay is not deployed.
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# Maximum number of orphaned TCP sockets (not attached to any user process).
net.ipv4.tcp_max_orphans = 32768

# Maximum number of TIME-WAIT sockets.
# Prevents memory exhaustion from too many stale connections.
net.ipv4.tcp_max_tw_buckets = 32768

# =============================================================================
# BBR Congestion Control
# =============================================================================

# Use BBR (Bottleneck Bandwidth and Round-trip propagation time) for
# TCP congestion control. BBR significantly improves throughput and
# reduces latency, especially on long-distance connections (important
# for China-overseas traffic).
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# =============================================================================
# Memory Protection (ASLR, Hardlinks, Symlinks)
# =============================================================================

# Enable Address Space Layout Randomization (ASLR) at maximum level.
# 0 = disabled, 1 = conservative, 2 = full randomization
# Randomizes the positions of stack, mmap, heap, and vdso to make
# exploitation more difficult.
kernel.randomize_va_space = 2

# Restrict access to kernel logs (dmesg) to root only.
# Prevents unprivileged users from reading potentially sensitive kernel messages.
kernel.dmesg_restrict = 1

# Restrict access to kernel pointers in /proc and other interfaces.
# Prevents information leakage that could aid exploitation.
kernel.kptr_restrict = 2

# Protect hardlinks and symlinks from following by unprivileged processes.
# Prevents symlink/hardlink-based privilege escalation attacks (TOCTOU).
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Restrict creation of FIFOs and regular files in world-writable
# sticky directories (like /tmp) to prevent certain race conditions.
fs.protected_fifos = 2
fs.protected_regular = 2

# Restrict unprivileged access to performance events.
# Prevents side-channel attacks via perf_event_open.
kernel.perf_event_paranoid = 3

# Disable unprivileged user namespace cloning.
# NOTE: This parameter is Debian/Ubuntu-specific (kernel patch).
# It does NOT exist on RHEL/CentOS/Fedora/Arch kernels and will produce
# a harmless "unknown key" warning on those systems.
# On non-Debian systems, use: echo 0 > /proc/sys/user/max_user_namespaces
kernel.unprivileged_userns_clone = 0

# Restrict ptrace to only direct child processes.
# 0 = only processes with direct relationship can ptrace
kernel.yama.ptrace_scope = 1

# =============================================================================
# IPv6 Settings
# =============================================================================

# Disable IPv6 if not needed (reduces attack surface).
# Set to 0 to enable IPv6 if your network requires it.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# If IPv6 is enabled, apply the same protections as IPv4:
# Disable IPv6 source routing
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Disable IPv6 router advertisements acceptance
# (only needed if this server acts as an IPv6 client on a managed network)
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# =============================================================================
# Network Buffer Tuning
# =============================================================================

# Increase socket buffer sizes for better throughput on high-latency links.
# Important for proxy servers handling many concurrent connections.
net.core.rmem_default = 262144
net.core.rmem_max = 16777216
net.core.wmem_default = 262144
net.core.wmem_max = 16777216

# TCP memory auto-tuning ranges (min, default, max) in pages.
net.ipv4.tcp_rmem = 4096 262144 16777216
net.ipv4.tcp_wmem = 4096 262144 16777216

# Maximum number of packets queued on the INPUT side.
net.core.netdev_max_backlog = 4096

# Maximum number of connection requests that can be queued.
net.core.somaxconn = 4096

# =============================================================================
# Local Port Range
# =============================================================================

# Expand the range of local ports available for outgoing connections.
# Default is typically 32768-60999; expand for proxy servers handling
# many simultaneous connections.
net.ipv4.ip_local_port_range = 1024 65535
