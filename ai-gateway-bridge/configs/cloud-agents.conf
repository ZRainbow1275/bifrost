###############################################################################
# AI Gateway Bridge - Cloud Provider Agent Database
###############################################################################
# This file contains a comprehensive database of known monitoring agents,
# security daemons, and telemetry services pre-installed by Chinese and
# international cloud providers.
#
# Format:
#   [provider_name]
#   service=<systemd_service_name>
#   process=<process_name_or_binary_path>
#   package=<package_name_to_remove>
#   path=<file_or_directory_to_remove>
#   cron=<cron_pattern_to_remove>
#
# Lines starting with '#' are comments.
# Empty lines are ignored.
# Each provider block begins with [provider_name].
#
# Used by: scripts/dd-reinstall.sh
###############################################################################

# =============================================================================
# Tencent Cloud (腾讯云)
# =============================================================================

[tencent]
# TAT Agent — Tencent Automation Tools (远程命令执行)
service=tat_agent
process=tat_agent
path=/usr/local/qcloud/tat_agent
path=/usr/local/qcloud

# Stargate Agent — 腾讯云监控数据采集
service=sgagent
process=sgagent
path=/usr/local/qcloud/stargate
path=/usr/local/qcloud/monitor

# Barad Agent — 腾讯云监控指标上报
service=barad_agent
process=barad_agent
path=/usr/local/qcloud/barad

# YunJing — 腾讯云主机安全 (云镜)
service=YunJing
process=YDService
process=YDLive
process=YDEdr
package=yunjing
path=/usr/local/qcloud/YunJing
path=/usr/local/qcloud/YDEyes

# TCSS Agent — 腾讯云容器安全服务
service=tcss_agent
process=tcss_agent
path=/usr/local/qcloud/tcss_agent

# Monitor Components (云监控聚合)
path=/usr/local/qcloud/monitor
path=/usr/local/qcloud/cloudaudit

# Tencent Cloud Init
service=cloud-init
service=cloud-config
service=cloud-final

# Tencent NTP override
path=/etc/ntp.conf.tencent

