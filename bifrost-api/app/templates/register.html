<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost 注册</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: #0F1218;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Header gradient bar --- */
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00F2FE 0%, #FBC2EB 100%);
        }

        /* --- Main card --- */
        .card {
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            margin: 16px;
            background: #181C24;
            border: 1px solid #2A2F3A;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00F2FE, #FBC2EB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .slots-badge {
            text-align: center;
            margin-bottom: 24px;
        }

        .slots-badge span {
            display: inline-block;
            padding: 4px 14px;
            font-size: 13px;
            border-radius: 20px;
            background: rgba(0, 242, 254, 0.1);
            color: #00F2FE;
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        .slots-badge.disabled span {
            background: rgba(255, 80, 80, 0.1);
            color: #FF5050;
            border-color: rgba(255, 80, 80, 0.25);
        }

        /* --- Form --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #AAA;
            margin-bottom: 6px;
        }

        .form-group label .optional {
            color: #666;
            font-size: 12px;
            margin-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            color: #E0E0E0;
            background: #0F1218;
            border: 1px solid #2A2F3A;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input::placeholder {
            color: #555;
        }

        .form-group input:focus {
            border-color: #00F2FE;
        }

        .form-group .hint {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #0F1218;
            background: linear-gradient(135deg, #00F2FE, #4FACFE);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Error / message --- */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 80, 80, 0.1);
            color: #FF5050;
            border: 1px solid rgba(255, 80, 80, 0.25);
        }

        .message.success {
            display: block;
            background: rgba(0, 242, 254, 0.1);
            color: #00F2FE;
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        /* --- Result panel --- */
        .result-panel {
            display: none;
        }

        .result-panel.visible {
            display: block;
        }

        .result-item {
            margin-bottom: 16px;
        }

        .result-item label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 4px;
        }

        .result-item .value-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-item .value {
            flex: 1;
            padding: 10px 14px;
            font-size: 14px;
            font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
            color: #00F2FE;
            background: #0F1218;
            border: 1px solid #2A2F3A;
            border-radius: 8px;
            word-break: break-all;
            user-select: all;
        }

        .btn-copy {
            flex-shrink: 0;
            padding: 10px 14px;
            font-size: 13px;
            color: #E0E0E0;
            background: #2A2F3A;
            border: 1px solid #3A3F4A;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: #3A3F4A;
        }

        .btn-copy.copied {
            color: #00F2FE;
            border-color: #00F2FE;
        }

        /* --- Footer --- */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
                border-radius: 12px;
            }
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body data-api-prefix="{{ api_prefix }}">
    <div class="header-bar"></div>

    <div class="card">
        <div class="logo">
            <h1>Bifrost</h1>
        </div>
        <p class="subtitle">AI API 网关 - 自助注册</p>

        <div class="slots-badge" id="slotsBadge">
            <span id="slotsText">加载中...</span>
        </div>

        <!-- Registration form -->
        <div id="formSection">
            <div id="msgBox" class="message"></div>

            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="小写字母开头，支持字母、数字、下划线、短横线"
                        pattern="^[a-z][a-z0-9_-]+$"
                        minlength="2"
                        maxlength="31"
                        required
                    />
                    <p class="hint">2-31 个字符，小写字母开头</p>
                </div>

                <div class="form-group">
                    <label for="email">邮箱 <span class="optional">(选填)</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your@email.com"
                    />
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">注 册</button>
            </form>
        </div>

        <!-- Result panel (hidden until success) -->
        <div class="result-panel" id="resultPanel">
            <div class="message success" id="successMsg">注册成功！请妥善保存以下信息。</div>

            <div class="result-item">
                <label>API Key</label>
                <div class="value-row">
                    <div class="value" id="resultKey"></div>
                    <button class="btn-copy" onclick="copyValue('resultKey', this)">复制</button>
                </div>
            </div>

            <div class="result-item">
                <label>Base URL</label>
                <div class="value-row">
                    <div class="value" id="resultUrl"></div>
                    <button class="btn-copy" onclick="copyValue('resultUrl', this)">复制</button>
                </div>
            </div>

            <div class="result-item">
                <label>用户名</label>
                <div class="value-row">
                    <div class="value" id="resultUser"></div>
                    <button class="btn-copy" onclick="copyValue('resultUser', this)">复制</button>
                </div>
            </div>
        </div>

        <div class="footer">Bifrost AI Gateway</div>
    </div>

    <script>
        // ------------------------------------------------------------------
        // State
        // ------------------------------------------------------------------
        const msgBox     = document.getElementById('msgBox');
        const submitBtn  = document.getElementById('submitBtn');
        const form       = document.getElementById('registerForm');
        const formSec    = document.getElementById('formSection');
        const resultSec  = document.getElementById('resultPanel');
        const slotsBadge = document.getElementById('slotsBadge');
        const slotsText  = document.getElementById('slotsText');
        const apiPrefix  = document.body.dataset.apiPrefix || '';

        function apiUrl(path) {
            return `${apiPrefix}${path}`;
        }

        // ------------------------------------------------------------------
        // Load registration status on page load
        // ------------------------------------------------------------------
        async function loadStatus() {
            try {
                const res = await fetch(apiUrl('/api/v1/register/status'));
                const json = await res.json();
                if (json.success && json.data) {
                    const d = json.data;
                    if (!d.enabled) {
                        slotsText.textContent = '注册已关闭';
                        slotsBadge.classList.add('disabled');
                        submitBtn.disabled = true;
                    } else if (d.remaining_today <= 0) {
                        slotsText.textContent = '今日名额已满';
                        slotsBadge.classList.add('disabled');
                        submitBtn.disabled = true;
                    } else {
                        slotsText.textContent = '今日剩余名额: ' + d.remaining_today + ' / ' + d.max_per_day;
                    }
                }
            } catch {
                slotsText.textContent = '无法获取注册状态';
                slotsBadge.classList.add('disabled');
            }
        }
        loadStatus();

        // ------------------------------------------------------------------
        // Submit registration
        // ------------------------------------------------------------------
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideMsg();

            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();

            if (!username) {
                showMsg('请输入用户名', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            try {
                const res = await fetch(apiUrl('/api/v1/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email }),
                });

                const json = await res.json();

                if (res.ok && json.success) {
                    // Show result panel
                    document.getElementById('resultKey').textContent  = json.api_key;
                    document.getElementById('resultUrl').textContent  = json.base_url;
                    document.getElementById('resultUser').textContent = json.username;
                    formSec.style.display = 'none';
                    resultSec.classList.add('visible');
                    // Refresh slots
                    loadStatus();
                } else {
                    const detail = json.detail || json.message || '注册失败，请稍后重试';
                    showMsg(detail, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注 册';
                }
            } catch (err) {
                showMsg('网络错误，请检查连接后重试', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '注 册';
            }
        });

        // ------------------------------------------------------------------
        // Helpers
        // ------------------------------------------------------------------
        function showMsg(text, type) {
            msgBox.textContent = text;
            msgBox.className = 'message ' + type;
        }

        function hideMsg() {
            msgBox.className = 'message';
            msgBox.textContent = '';
        }

        function copyValue(elementId, btn) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(function () {
                btn.textContent = '已复制';
                btn.classList.add('copied');
                setTimeout(function () {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function () {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '已复制';
                btn.classList.add('copied');
                setTimeout(function () {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
