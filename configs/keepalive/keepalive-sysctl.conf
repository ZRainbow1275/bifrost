###############################################################################
# Bifrost - TCP Keepalive & Performance Kernel Parameters
#
# Optimized for long-lived proxy tunnel connections between Server A and
# Server B. These parameters ensure that:
#   - Dead connections are detected quickly (30s keepalive cycle)
#   - TCP Fast Open reduces handshake latency for recurring connections
#   - MTU probing avoids silent packet drops from path MTU black holes
#
# Place this file at: /etc/sysctl.d/100-ai-gateway-keepalive.conf
# Apply with: sysctl -p /etc/sysctl.d/100-ai-gateway-keepalive.conf
#
# NOTE: These values OVERRIDE the more conservative defaults in
#       99-ai-gateway-hardening.conf for keepalive-specific parameters.
#       Numeric prefix 100 ensures this loads AFTER the hardening file
#       (99), so sysctl's last-write-wins semantics guarantee that
#       these keepalive-tuned values take precedence. For example,
#       hardening.conf sets tcp_keepalive_time = 600 but this file
#       overrides it to 30 for proxy tunnel requirements.
###############################################################################

# =============================================================================
# TCP Keepalive Parameters
# =============================================================================

# How long (seconds) a connection can remain idle before the kernel starts
# sending keepalive probes. Default is 7200 (2 hours); we use 30s because
# NAT middleboxes and carrier-grade NATs on Chinese networks typically
# expire idle UDP/TCP mappings in 30-120 seconds.
net.ipv4.tcp_keepalive_time = 30

# Interval (seconds) between successive keepalive probes when no
# acknowledgment is received. 10 seconds gives fast detection without
# excessive bandwidth overhead.
net.ipv4.tcp_keepalive_intvl = 10

# Number of unacknowledged keepalive probes before the kernel considers
# the connection dead and sends RST. 3 probes * 10s interval = 30s
# worst-case detection time after the first missed probe.
net.ipv4.tcp_keepalive_probes = 3

# =============================================================================
# TCP Fast Open (TFO)
# =============================================================================

# Enable TCP Fast Open for both client (bit 0) and server (bit 1) roles.
# Value 3 = 0b11 = client + server.
# TFO allows data to be carried in the SYN and SYN-ACK packets, saving
# one full RTT on connection establishment for repeat connections.
# Critical for proxy tunnels where connections are frequently recycled.
net.ipv4.tcp_fastopen = 3

# =============================================================================
# Path MTU Discovery
# =============================================================================

# Enable active MTU probing to handle PMTU black holes.
# Value 1 = enabled (use initial MSS of tcp_base_mss and probe upward).
# Many ISPs and cloud providers silently drop ICMP "fragmentation needed"
# messages, causing PMTU black holes. Active probing bypasses this by
# testing progressively larger segments.
net.ipv4.tcp_mtu_probing = 1

# Base MSS to start probing from (bytes). 1024 is conservative enough
# to work across most tunneled/encapsulated paths.
net.ipv4.tcp_base_mss = 1024
