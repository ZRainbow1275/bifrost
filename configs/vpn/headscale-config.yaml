# =============================================================================
# Bifrost - Headscale Configuration
# =============================================================================
# Headscale: Self-hosted Tailscale control server (v0.23.x).
# Provides: Mesh VPN, ACL, DERP relay, user namespaces.
#
# This config targets Headscale v0.23.0+. Key format changes from v0.22.x:
#   - grpc_listen_addr removed (gRPC replaced by noise protocol)
#   - acl_policy_path removed (use policy.path instead)
#   - ip_prefixes renamed to prefixes with v4/v6/allocation sub-keys
#   - randomize_client_port, disable_check_updates, logtail removed
#   - DERP server no longer has its own private_key_path (uses noise key)
#   - TLS config moved under a 'tls' section
#
# Template variables:
#   {{SERVER_URL}}       - Public server URL (https://vpn.yourdomain.com)
#   {{LISTEN_ADDR}}      - Listen address (0.0.0.0:8080)
#   {{METRICS_ADDR}}     - Metrics listen address (127.0.0.1:9090)
#   {{BASE_DOMAIN}}      - Base domain for MagicDNS (vpn.yourdomain.com)
#   {{DB_PATH}}          - SQLite database path
#   {{SOCKET_PATH}}      - Unix socket path for CLI
#   {{VPN_SUBNET_V4}}    - IPv4 VPN prefix (10.8.0.0/24)
# =============================================================================

# --- Server ---
server_url: "{{SERVER_URL}}"
listen_addr: "{{LISTEN_ADDR}}"
metrics_listen_addr: "{{METRICS_ADDR}}"

# --- Noise (Tailscale protocol) ---
# Note: gRPC was removed in Headscale 0.23.x. All communication uses
# the Tailscale noise protocol now.
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# --- IP Prefixes ---
# Restrict to 10.8.0.0/24 to match our VPN subnet design.
prefixes:
  v4: "{{VPN_SUBNET_V4}}"
  allocation: sequential

# --- Database ---
database:
  type: sqlite
  sqlite:
    path: "{{DB_PATH}}"

# --- Unix Socket (for CLI communication) ---
unix_socket: "{{SOCKET_PATH}}"
unix_socket_permission: "0770"

# --- DERP (Relay) ---
# DERP servers help clients connect when direct connections fail (NAT traversal).
derp:
  server:
    # Enable embedded DERP server
    enabled: true
    region_id: 999
    region_code: "ai-gw"
    region_name: "Bifrost DERP"
    stun_listen_addr: "0.0.0.0:3478"
    # Note: private_key_path removed in 0.23.x; DERP reuses the noise key
    # Automatically add this embedded DERP to the list
    automatically_add_embedded_derp_region: true
    ipv4: "1.2.3.4"
    ipv6: ""

  urls: []
  paths: []
  auto_update_enabled: true
  update_frequency: 24h

# --- DNS ---
dns:
  # Override DNS for connected clients
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8

  # Split DNS for internal domains
  restricted_nameservers: {}

  # Search domains
  domains: []

  # Extra DNS records for internal service discovery
  extra_records:
    - name: "api.internal"
      type: "A"
      value: "172.16.0.10"
    - name: "monitor.internal"
      type: "A"
      value: "172.16.0.20"

  # MagicDNS
  magic_dns: true
  base_domain: "{{BASE_DOMAIN}}"

# --- Logging ---
log:
  format: text
  level: info

# --- ACL (Access Control Lists) ---
# Define who can access what within the VPN mesh.
policy:
  mode: file
  path: ""

# --- Node / Pre-auth ---
# How long a node can go without re-authenticating
node_update_check_interval: 10s

# --- Ephemeral nodes ---
# Auto-expire inactive ephemeral nodes
ephemeral_node_inactivity_timeout: 5m

# --- OIDC (Optional - uncomment to enable SSO) ---
# oidc:
#   only_start_if_oidc_is_available: true
#   issuer: "https://auth.yourdomain.com"
#   client_id: "headscale"
#   client_secret: "your-client-secret"
#   expiry: 180d
#   use_expiry_from_token: false
#   scope:
#     - openid
#     - profile
#     - email
#   extra_params: {}
#   allowed_domains: []
#   allowed_groups: []
#   allowed_users: []
#   strip_email_domain: true

# --- TLS ---
# Headscale behind a reverse proxy (Caddy handles TLS termination).
# In v0.23.x, TLS config is under a 'tls' section.
tls:
  cert_path: ""
  key_path: ""
  letsencrypt:
    hostname: ""
    listen: ""
    cache_dir: ""
    challenge_type: ""
# Note: disable_check_updates, logtail, and randomize_client_port
# were removed in Headscale 0.23.x.
